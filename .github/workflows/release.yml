name: Release — Build & Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.3.5)'
        required: true
        type: string
      force_release:
        description: 'Overwrite existing release if it already exists'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building release $TAG (version $VERSION)"

      - name: Verify version matches manifests
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CHROME_VER=$(jq -r '.version' extension/manifest.json)
          FIREFOX_VER=$(jq -r '.version' firefox-mv2/manifest.json)
          echo "Chrome manifest: $CHROME_VER"
          echo "Firefox manifest: $FIREFOX_VER"
          if [ "$CHROME_VER" != "$VERSION" ]; then
            echo "::warning::Chrome manifest version ($CHROME_VER) != tag version ($VERSION)"
          fi
          if [ "$FIREFOX_VER" != "$VERSION" ]; then
            echo "::warning::Firefox manifest version ($FIREFOX_VER) != tag version ($VERSION)"
          fi

  # Guard: block accidental overwrites of existing releases.
  # An overwrite is only allowed when explicitly signalled:
  #   • tag push   → annotated tag whose message contains "re-release"
  #                  e.g. git tag -f v0.3.4 -m "re-release: docs update"
  #   • manual run → workflow_dispatch with force_release=true
  guard:
    runs-on: ubuntu-latest
    needs: [check-version]
    outputs:
      release_exists: ${{ steps.check.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch annotated tag object
        env:
          TAG: v${{ needs.check-version.outputs.version }}
        run: git fetch origin "+refs/tags/$TAG:refs/tags/$TAG" --force

      - name: Check for existing release and validate re-release intent
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: v${{ needs.check-version.outputs.version }}
        run: |
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Release $TAG already exists — checking re-release intent."

            IS_RERELEASE=false

            # workflow_dispatch with force_release=true
            if [ "${{ github.event_name }}" = "workflow_dispatch" ] && \
               [ "${{ inputs.force_release }}" = "true" ]; then
              IS_RERELEASE=true
              echo "::notice::Re-release authorised via workflow_dispatch (force_release=true)."
            fi

            # annotated tag whose message contains "re-release" (case-insensitive)
            # git for-each-ref is more reliable than git tag -l for reading tag objects
            if [ "$IS_RERELEASE" = "false" ]; then
              TAG_MSG=$(git for-each-ref --format='%(contents)' "refs/tags/$TAG" 2>/dev/null || echo "")
              echo "Tag message: $TAG_MSG"
              if echo "$TAG_MSG" | grep -qi "re-release"; then
                IS_RERELEASE=true
                echo "::notice::Re-release authorised via annotated tag message."
              fi
            fi

            if [ "$IS_RERELEASE" = "false" ]; then
              echo ""
              echo "::error::Release $TAG already exists."
              echo "::error::To overwrite intentionally, choose one of:"
              echo "::error::  [tag]    git tag -f $TAG -m 're-release: <reason>' && git push --force origin $TAG"
              echo "::error::  [manual] GitHub UI → Actions → Release workflow → Run workflow → force_release=true"
              exit 1
            fi
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No existing release for $TAG — proceeding with new release."
          fi

  build:
    runs-on: ubuntu-latest
    needs: [check-version, guard]
    strategy:
      matrix:
        target:
          - name: chrome
            dir: extension
            filename: browser-whiskor-chrome
          - name: firefox
            dir: firefox-mv2
            filename: browser-whiskor-firefox
          - name: full
            dir: .
            filename: browser-whiskor-full
    steps:
      - uses: actions/checkout@v4

      - name: Build ${{ matrix.target.name }} ZIP
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          FILENAME="${{ matrix.target.filename }}-${VERSION}.zip"
          if [ "${{ matrix.target.name }}" = "full" ]; then
            echo "Creating $FILENAME (full bundle: server + extensions + config + docs)"
            zip -r "${FILENAME}" \
              server/ extension/ firefox-mv2/ scripts/ skills/ \
              docs/ \
              start.bat start.ps1 start.sh \
              README.md config.json package.json package-lock.json \
              -x "*.gitkeep" -x "*.DS_Store"
          else
            cd "${{ matrix.target.dir }}"
            echo "Creating $FILENAME from ${{ matrix.target.dir }}/"
            zip -r "../${FILENAME}" . \
              -x "*.gitkeep" -x "*.DS_Store"
          fi
          echo "artifact=$FILENAME" >> "$GITHUB_ENV"
          echo "ZIP created: $(ls -lh "${FILENAME}" | awk '{print $5}')"

      - name: Upload ZIP as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.filename }}-${{ needs.check-version.outputs.version }}
          path: ${{ matrix.target.filename }}-${{ needs.check-version.outputs.version }}.zip

  release:
    runs-on: ubuntu-latest
    needs: [check-version, guard, build]
    steps:
      - uses: actions/checkout@v4

      - name: Download all ZIPs
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate SHA256 checksums
        run: |
          find dist -name "*.zip" | sort | xargs sha256sum | sed 's|dist/.*/||' > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Generate release notes
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"

          # Pull this version's section out of docs/changelog.md so the release
          # notes show what changed, not just install instructions.
          awk -v ver="$VERSION" '
            index($0, "## [") == 1 {
              if (capture) exit
              if (index($0, "[" ver "]") == 4) { capture=1; next }
              next
            }
            capture { print }
          ' docs/changelog.md > changelog-section.md

          if [ ! -s changelog-section.md ]; then
            echo "::warning::No docs/changelog.md section found for [$VERSION] — release notes will omit it." >&2
          fi

          {
          echo "## browser-whiskor v${{ needs.check-version.outputs.version }}"
          echo ""
          cat changelog-section.md
          cat <<'MARKDOWN'
          ### Downloads
          | Package | File | Contains |
          |---------|------|----------|
          | Full Bundle | `browser-whiskor-full-${{ needs.check-version.outputs.version }}.zip` | server + both extensions + config |
          | Chrome (MV3) | `browser-whiskor-chrome-${{ needs.check-version.outputs.version }}.zip` | extension only |
          | Firefox (MV2) | `browser-whiskor-firefox-${{ needs.check-version.outputs.version }}.zip` | extension only |

          ### Quick Start (Full Bundle)
          ```bash
          unzip browser-whiskor-full-*.zip
          cd browser-whiskor
          npm install
          npm start          # starts server on :7892
          # Then load extension/ (Chrome) or firefox-mv2/ (Firefox) as unpacked
          ```

          ### Install (Extension Only)
          - **Chrome**: Extensions → Load unpacked → select `extension/`
          - **Firefox**: `about:debugging#/runtime/this-firefox` → Load Temporary Add-on → select `firefox-mv2/manifest.json`

          > **Note:** Firefox build requires `extensions.experiments.enabled = true` in `about:config` for devtools support.
          MARKDOWN
          } > release-notes.md

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: browser-whiskor v${{ needs.check-version.outputs.version }}
          body_path: release-notes.md
          files: |
            dist/*/*.zip
            SHA256SUMS.txt
          fail_on_unmatched_files: false
