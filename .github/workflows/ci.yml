name: CI - Auto-Sync & Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  # ── 1. Auto-sync shared/ to both extensions ────────────────────────────────
  auto-sync:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if shared/ changed
        id: check
        run: |
          DIFF=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          SHARED_CHANGED=$(echo "$DIFF" | grep -c "^shared/" || true)
          echo "changed=$SHARED_CHANGED" >> $GITHUB_OUTPUT
          echo "shared_changed=$SHARED_CHANGED"

      - name: Sync shared/ to Chrome and Firefox extensions
        if: steps.check.outputs.changed == '1'
        run: |
          echo "## Auto-Sync Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          COPIED=0

          for f in $(find shared/injected -type f | sort); do
            REL="${f#shared/}"
            CH="extension/$REL"
            FF="firefox-mv2/$REL"

            # Ensure target directories exist
            mkdir -p "$(dirname "$CH")" "$(dirname "$FF")"

            # Only copy if content differs (avoids unnecessary commits)
            NEEDS_UPDATE=false

            if [ ! -f "$CH" ] || ! diff -q "$f" "$CH" > /dev/null 2>&1; then
              NEEDS_UPDATE=true
            fi
            if [ ! -f "$FF" ] || ! diff -q "$f" "$FF" > /dev/null 2>&1; then
              NEEDS_UPDATE=true
            fi

            if [ "$NEEDS_UPDATE" = true ]; then
              cp "$f" "$CH"
              cp "$f" "$FF"
              echo "  📦 $REL" >> $GITHUB_STEP_SUMMARY
              COPIED=$((COPIED + 1))
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**$COPIED file(s) synced**" >> $GITHUB_STEP_SUMMARY
          echo "copied=$COPIED" >> $GITHUB_OUTPUT

      - name: Commit and push synced files
        if: steps.check.outputs.changed == '1'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet extension/ firefox-mv2/; then
            echo "No changes to commit"
          else
            git add extension/ firefox-mv2/
            git commit -m "chore: sync shared/ to Chrome and Firefox extensions [skip ci]"
            git push
            echo "## Sync committed and pushed" >> $GITHUB_STEP_SUMMARY
          fi

  # ── 2. Verify sync integrity (always runs) ─────────────────────────────────
  verify-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify shared/ matches both extensions
        run: |
          echo "## Sync Verification" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          ERRORS=0

          if [ -d "shared/injected" ]; then
            for f in $(find shared/injected -type f | sort); do
              REL="${f#shared/}"
              CH="extension/$REL"
              FF="firefox-mv2/$REL"

              if [ -f "$CH" ] && [ -f "$FF" ]; then
                if ! diff -q "$f" "$CH" > /dev/null 2>&1; then
                  echo "❌ $REL differs from extension/" >> $GITHUB_STEP_SUMMARY
                  ERRORS=$((ERRORS + 1))
                elif ! diff -q "$f" "$FF" > /dev/null 2>&1; then
                  echo "❌ $REL differs from firefox-mv2/" >> $GITHUB_STEP_SUMMARY
                  ERRORS=$((ERRORS + 1))
                else
                  echo "✅ $REL" >> $GITHUB_STEP_SUMMARY
                fi
              else
                echo "⚠️ $REL missing in one extension" >> $GITHUB_STEP_SUMMARY
                ERRORS=$((ERRORS + 1))
              fi
            done
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "$ERRORS" -gt 0 ]; then
            echo "**⚠️ $ERRORS error(s)**" >> $GITHUB_STEP_SUMMARY
            echo "::error::$ERRORS sync error(s)"
            exit 1
          else
            echo "**✅ All files in sync**" >> $GITHUB_STEP_SUMMARY
          fi

  # ── 3. Run tests ───────────────────────────────────────────────────────────
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --ignore-scripts 2>/dev/null || npm install

      - name: Run tests
        run: node --test tests/unit/*.test.js tests/integration/*.test.js tests/stress/*.test.js

      - name: Test summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Category | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY

          for cat in unit integration stress; do
            OUTPUT=$(node --test tests/$cat/*.test.js 2>&1)
            PASS=$(echo "$OUTPUT" | grep -c "^ok " || true)
            FAIL=$(echo "$OUTPUT" | grep -c "^not ok " || true)
            if [ "$FAIL" -gt 0 ]; then
              echo "| $cat | ❌ $PASS pass, $FAIL fail |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $cat | ✅ $PASS pass |" >> $GITHUB_STEP_SUMMARY
            fi
          done
