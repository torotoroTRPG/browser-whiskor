<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>browser-whiskor docs</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --base-font-size: 14px;
      --theme-color: #3a4d7a;
      --heading-color: #2a3a5c;
      --strong-color: inherit;
      --mono-font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
      --sidebar-width: 16rem;
      --sidebar-background: #fafbfc;
      --sidebar-border-color: #e8eaed;
    }
    ::selection { background: rgba(254, 87, 46, 0.15); }
    h1, h2, h3, h4, h5, h6 { color: var(--heading-color) !important; }
    strong {
      color: inherit;
      background: linear-gradient(transparent 55%, rgba(254, 147, 46, 0.18) 55%, rgba(254, 147, 46, 0.18) 90%, transparent 90%);
    }
    @media (prefers-color-scheme: dark) {
      strong { background: linear-gradient(transparent 55%, rgba(255, 160, 80, 0.15) 55%, rgba(255, 160, 80, 0.15) 90%, transparent 90%); }
    }

    /* blockquote: theme-simple fades these to near-invisible */
    blockquote { color: inherit !important; opacity: 0.82; border-left-color: var(--theme-color) !important; }
    blockquote strong { color: inherit; }

    /* inline code readability */
    code { background: rgba(14, 47, 244, 0.06) !important; color: inherit !important; }

    /* table header contrast */
    th { color: var(--heading-color) !important; }
    @media (prefers-color-scheme: dark) {
      :root {
        --theme-color: #6b7faa;
        --heading-color: #9aa8c4;
        --strong-color: inherit;
        --sidebar-background: #161b22;
        --sidebar-border-color: #30363d;
        --mono-hue: 215;
        --mono-saturation: 15%;
      }
      ::selection { background: rgba(255, 138, 101, 0.2); }
      body { background: #0d1117; color: #c9d1d9; }
    }

    /* ── Background logo ── */
    body::after {
      content: '';
      position: fixed;
      bottom: -8%;
      right: -4%;
      width: 420px;
      height: 420px;
      background: url('../icons/icon.svg') no-repeat center / contain;
      opacity: 0.015;
      pointer-events: none;
      z-index: 0;
    }
    @media (prefers-color-scheme: dark) {
      body::after { opacity: 0.03; filter: brightness(2); }
    }
    @media (max-width: 600px) {
      body::after { width: 200px; height: 200px; bottom: -4%; right: -2%; }
    }

    /* ── Landing cards ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      margin: 1.5em 0;
    }
    .card-grid a {
      display: block;
      padding: 14px 16px;
      border-radius: 6px;
      border: 1px solid var(--sidebar-border-color, #e8eaed);
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s;
    }
    .card-grid a:hover {
      border-color: var(--theme-color);
    }
    .card-grid a strong {
      display: block;
      margin-bottom: 4px;
      font-size: 13px;
    }
    .card-grid a span {
      font-size: 11px;
      opacity: 0.65;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'browser-whiskor',
      repo: 'https://github.com/torotoroTRPG/browser-whiskor',
      loadSidebar: true,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md',
      },
      subMaxLevel: 3,
      auto2top: true,
      homepage: 'home.md',
      search: {
        placeholder: 'Search docs...',
        noData: 'No results.',
        depth: 3,
      },
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
