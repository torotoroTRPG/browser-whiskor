<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>browser-whiskor docs</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">
  <style>
    :root {
      --base-font-size: 14px;
      --theme-color: #7c8ea0;
      --mono-font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
      --sidebar-width: 16rem;
      --sidebar-background: #fafbfc;
      --sidebar-border-color: #e8eaed;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --sidebar-background: #161b22;
        --sidebar-border-color: #30363d;
        --mono-hue: 215;
        --mono-saturation: 15%;
      }
      body { background: #0d1117; color: #c9d1d9; }
    }

    /* ── Landing cards ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 12px;
      margin: 1.5em 0;
    }
    .card-grid a {
      display: block;
      padding: 14px 16px;
      border-radius: 6px;
      border: 1px solid var(--sidebar-border-color, #e8eaed);
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s;
    }
    .card-grid a:hover {
      border-color: var(--theme-color);
    }
    .card-grid a strong {
      display: block;
      margin-bottom: 4px;
      font-size: 13px;
    }
    .card-grid a span {
      font-size: 11px;
      opacity: 0.65;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'browser-whiskor',
      repo: 'https://github.com/torotoroTRPG/browser-whiskor',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      homepage: 'home.md',
      search: {
        placeholder: 'Search docs...',
        noData: 'No results.',
        depth: 3,
      },
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
